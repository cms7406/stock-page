<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星宸科技每日淨值</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 720px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #6b7280;
      margin-bottom: 28px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .item {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
    }
    .label {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .value {
      font-size: 1.5rem;
      font-weight: bold;
      word-break: break-word;
    }
    .footer {
      margin-top: 24px;
      font-size: 0.95rem;
      color: #6b7280;
      line-height: 1.7;
    }
    .status {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #2563eb;
    }
    @media (max-width: 640px) {
      .card { padding: 24px; }
      h1 { font-size: 1.6rem; }
      .value { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>星宸科技每日淨值</h1>
    <p class="subtitle">股票代號：301536.SZ ｜ 股數：25,000 股</p>

    <section class="grid">
      <div class="item">
        <div class="label">最新股價（人民幣）</div>
        <div class="value" id="stockPrice">載入中...</div>
      </div>
      <div class="item">
        <div class="label">持股總值（人民幣）</div>
        <div class="value" id="totalCny">載入中...</div>
      </div>
      <div class="item">
        <div class="label">換算新台幣</div>
        <div class="value" id="totalTwd">載入中...</div>
      </div>
      <div class="item">
        <div class="label">扣 10% 稅後淨值（新台幣）</div>
        <div class="value" id="netTwd">載入中...</div>
      </div>
    </section>

    <div class="status" id="statusText">正在抓取資料...</div>

    <div class="footer">
      <div>股價來源：Yahoo Finance 商品代號 <strong>301536.SZ</strong></div>
      <div>匯率來源：ExchangeRate-API（CNY → TWD）</div>
      <div>更新方式：頁面開啟時抓一次；如果頁面持續開著，會每 24 小時自動重抓一次。</div>
    </div>
  </main>

  <script>
    const STOCK_SYMBOL = '301536.SZ';
    const SHARES = 25000;
    const TAX_RATE = 0.10;

    const stockPriceEl = document.getElementById('stockPrice');
    const totalCnyEl = document.getElementById('totalCny');
    const totalTwdEl = document.getElementById('totalTwd');
    const netTwdEl = document.getElementById('netTwd');
    const statusTextEl = document.getElementById('statusText');

    function formatMoney(value, currency = '') {
      return `${currency}${Number(value).toLocaleString('zh-TW', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      })}`;
    }

    async function fetchStockPrice() {
      // Use public CORS proxy to avoid browser blocking
      const proxy = 'https://api.allorigins.win/raw?url=';
      const target = encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${STOCK_SYMBOL}?interval=1d&range=5d`);
      const url = proxy + target;

      const response = await fetch(url);
      if (!response.ok) throw new Error('股價資料讀取失敗');

      const data = await response.json();
      const result = data.chart?.result?.[0];
      const metaPrice = result?.meta?.regularMarketPrice;
      const closes = result?.indicators?.quote?.[0]?.close || [];
      const lastClose = [...closes].reverse().find(v => typeof v === 'number');
      const price = metaPrice ?? lastClose;

      if (typeof price !== 'number') {
        throw new Error('找不到有效股價');
      }

      return price;
    }

    async function fetchCnyToTwdRate() {
      const response = await fetch('https://open.er-api.com/v6/latest/CNY');
      if (!response.ok) throw new Error('匯率資料讀取失敗');

      const data = await response.json();
      const rate = data?.rates?.TWD;
      if (typeof rate !== 'number') {
        throw new Error('找不到 TWD 匯率');
      }
      return rate;
    }

    async function loadData() {
      try {
        statusTextEl.textContent = '正在抓取最新資料...';

        const [stockPrice, cnyToTwd] = await Promise.all([
          fetchStockPrice(),
          fetchCnyToTwdRate()
        ]);

        const totalCny = stockPrice * SHARES;
        const totalTwd = totalCny * cnyToTwd;
        const netTwd = totalTwd * (1 - TAX_RATE);

        stockPriceEl.textContent = formatMoney(stockPrice, '¥');
        totalCnyEl.textContent = formatMoney(totalCny, '¥');
        totalTwdEl.textContent = formatMoney(totalTwd, 'NT$');
        netTwdEl.textContent = formatMoney(netTwd, 'NT$');

        const now = new Date();
        statusTextEl.textContent = `最後更新：${now.toLocaleString('zh-TW')}`;
      } catch (error) {
        stockPriceEl.textContent = '讀取失敗';
        totalCnyEl.textContent = '讀取失敗';
        totalTwdEl.textContent = '讀取失敗';
        netTwdEl.textContent = '讀取失敗';
        statusTextEl.textContent = `資料載入失敗：${error.message}`;
        console.error(error);
      }
    }

    loadData();
    setInterval(loadData, 24 * 60 * 60 * 1000);
  </script>
</body>
</html>
