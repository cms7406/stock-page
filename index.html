<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星宸科技每日淨值</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 720px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #6b7280;
      margin-bottom: 28px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .item {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
    }
    .label {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .value {
      font-size: 1.5rem;
      font-weight: bold;
      word-break: break-word;
    }
    .footer {
      margin-top: 24px;
      font-size: 0.95rem;
      color: #6b7280;
      line-height: 1.7;
    }
    .status {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #2563eb;
    }
    @media (max-width: 640px) {
      .card { padding: 24px; }
      h1 { font-size: 1.6rem; }
      .value { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>星宸科技每日淨值</h1>
    <p class="subtitle">股票代號：301536.SZ ｜ 股數：25,000 股</p>

    <section class="grid">
      <div class="item">
        <div class="label">最新股價（人民幣）</div>
        <div class="value" id="stockPrice">載入中...</div>
      </div>
      <div class="item">
        <div class="label">持股總值（人民幣）</div>
        <div class="value" id="totalCny">載入中...</div>
      </div>
      <div class="item">
        <div class="label">換算新台幣</div>
        <div class="value" id="totalTwd">載入中...</div>
      </div>
      <div class="item">
        <div class="label">扣 10% 稅後淨值（新台幣）</div>
        <div class="value" id="netTwd">載入中...</div>
      </div>
    </section>

    <div class="status" id="statusText">正在讀取資料...</div>

    <div class="footer">
      <div>資料來源：GitHub Actions 每日更新</div>
      <div>股價代號：301536.SZ</div>
      <div>匯率：CNY → TWD</div>
    </div>
  </main>

  <script>
    const stockPriceEl = document.getElementById('stockPrice');
    const totalCnyEl = document.getElementById('totalCny');
    const totalTwdEl = document.getElementById('totalTwd');
    const netTwdEl = document.getElementById('netTwd');
    const statusTextEl = document.getElementById('statusText');

    function formatMoney(value, currency = '') {
      return `${currency}${Number(value).toLocaleString('zh-TW', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      })}`;
    }

    async function loadData() {
      try {
        const response = await fetch('./data.json?_=' + Date.now());
        if (!response.ok) throw new Error('data.json 讀取失敗');

        const data = await response.json();

        stockPriceEl.textContent = formatMoney(data.stock_price_cny, '¥');
        totalCnyEl.textContent = formatMoney(data.total_value_cny, '¥');
        totalTwdEl.textContent = formatMoney(data.total_value_twd, 'NT$');
        netTwdEl.textContent = formatMoney(data.net_value_twd_after_tax, 'NT$');

        statusTextEl.textContent = `最後更新：${data.updated_at}`;
      } catch (error) {
        stockPriceEl.textContent = '讀取失敗';
        totalCnyEl.textContent = '讀取失敗';
        totalTwdEl.textContent = '讀取失敗';
        netTwdEl.textContent = '讀取失敗';
        statusTextEl.textContent = '資料載入失敗';
        console.error(error);
      }
    }

    loadData();
  </script>
</body>
</html>
